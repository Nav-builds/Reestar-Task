<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pontano+Sans:wght@300..700&display=swap" rel="stylesheet">


    <title>REESTAR</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div>
        <!--Header Section-->

        <div class="header">
            <h1>REESTAR</h1>
            </div>

            <div class="header_title">
                <p>HOME | RECEIPE | CONTACT </p>
            </div>
        

        <!--Food Gallery Section-->


        <div class="food-card">
       

            <div class="food-card1">

                <img src="Green Goddess Hummus.jpg" alt="food item1" width="200px" height="400px">
                <h3> Green Goddess</h3>
                <p>Vibrant, Herb packed traditional Hummus </p>
                <button>Order Now</button>

            </div>
            <div class="food-card2">

                <img src="Salmon.jpg" alt="food item1" width="200px" height="400px">
                <h3> Salmon Curry</h3>
                <p>Spiced mixed milky style Salmon </p>
                <button>Order Now</button>

            </div>
            <div class="food-card3">

                <img src="Pancake Syrup.jpg" alt="food item1" width="200px" height="400px">
                <h3> Golden Pancake </h3>
                <p>English style syrup topped Pancake </p>
                <button>Order Now</button>
            </div>

            <div class="food-card3">

                <img src="oreo icecream.jpg" alt="food item1" width="200px" height="400px">
                <h3>Oreo icecream </h3>
                <p>Fully loaded orea vannilla mix Ice cream </p>
                <button>Order Now</button>
            </div>

       </div>

        <!--Contact Section-->

        <div class="container">

      

            <form>
                <table>
                          <h2>Contact Us</h2>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Your name" class="contact-form__input"></td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td><input type="email" placeholder="Your email" class="contact-form__input"></td>
                    </tr>
                    <tr>
                        <td>Message:</td>
                        <td>
                            <textarea placeholder="Your message" class="contact-form__textarea"></textarea>

                        </td>

                    <tr>
                        <td></td>
                        <td><button class="send_button">send</button></td>
                    </tr>

                </table>
            </form>
        </div>



    </div>


</body>

</html>
